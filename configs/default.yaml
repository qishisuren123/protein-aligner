# Cryo-EM 数据处理管线默认配置

# 数据检索配置
retrieval:
  # EMDB API
  emdb_api_base: "https://www.ebi.ac.uk/emdb/api"
  emdb_ftp_base: "https://ftp.ebi.ac.uk/pub/databases/emdb/structures"
  # RCSB API
  rcsb_api_base: "https://data.rcsb.org/rest/v1/core"
  rcsb_download_base: "https://files.rcsb.org/download"
  # 筛选条件
  resolution_min: 0.0   # 最小分辨率 (Å)
  resolution_max: 4.0   # 最大分辨率 (Å)
  method: "singleParticle"  # 成像方法
  max_entries: 5        # 最大下载条目数（样例模式）

# 生物学组装体配置
bio_assembly:
  enabled: true         # 启用生物组装体展开
  assembly_id: "1"      # 使用的组装体 ID（默认第一个）
  max_chains: 200       # 最大链数安全限制

# 重采样配置
resample:
  target_voxel_sizes: [1.0]  # 目标体素大小 (Å)
  interpolation_order: 3     # 插值阶数 (3=cubic)

# 归一化配置
normalization:
  method: "robust_zscore"  # 方法: robust_zscore, zscore, percentile
  percentile: 95           # percentile 方法的参数
  clip_min: 0.0
  clip_max: 1.0

# 对齐与质量控制配置
alignment_qc:
  # DensityCalculatorX 参数
  density_calculator: "gemmi_dcx"   # 使用 gemmi DensityCalculatorX
  default_resolution: 2.0           # 无 metadata 时使用的默认分辨率 (Å)
  dc_blur: 0                        # DensityCalculatorX blur 参数（0 = 最优）
  # CC 计算参数
  mask_threshold: 0.05    # CC 计算时的 mask 阈值
  # 质量阈值
  cc_threshold: 0.3       # CC_mask 最低通过阈值

# 对应标注配置
correspondence:
  # 原子类型标签: CA=1, N=2, C=3, O=4, CB=5, other=6
  atom_labels:
    CA: 1
    N: 2
    C: 3
    O: 4
    CB: 5
    OTHER: 6
  # 氨基酸类型标签 (1-20)
  aa_labels:
    ALA: 1
    ARG: 2
    ASN: 3
    ASP: 4
    CYS: 5
    GLN: 6
    GLU: 7
    GLY: 8
    HIS: 9
    ILE: 10
    LEU: 11
    LYS: 12
    MET: 13
    PHE: 14
    PRO: 15
    SER: 16
    THR: 17
    TRP: 18
    TYR: 19
    VAL: 20
  # 二级结构标签: coil=1, helix=2, strand=3
  ss_labels:
    coil: 1
    helix: 2
    strand: 3
  # 标注距离阈值 (Å)
  distance_threshold: 3.0
  # Voronoi 全覆盖标注
  use_voronoi: true                # 启用 Voronoi 标注（距离阈值外的体素）
  voronoi_max_confidence: 0.3      # Voronoi 标注的最大置信度

# 增强标注配置
enhancement:
  sim_b_factor: 100.0   # 模拟B因子（控制密度平滑程度）
  sim_resolution: 2.0   # 模拟分辨率 (Å)

# 去冗余配置
redundancy:
  sequence_identity: 0.7  # 序列相似度阈值 (70%)

# 路径配置
paths:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  output_dir: "data/output"
