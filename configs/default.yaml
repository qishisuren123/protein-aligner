# Cryo-EM 数据处理管线默认配置 (V3)
# V3 核心变化：CA-only 标注、三组 KDTree、Domain/Interface/Q-score 新标签
# V3.1: DCE 电子散射因子、4 层 tier（Gold/Silver/Copper/Hard）

# 数据检索配置
retrieval:
  # EMDB API
  emdb_api_base: "https://www.ebi.ac.uk/emdb/api"
  emdb_ftp_base: "https://ftp.ebi.ac.uk/pub/databases/emdb/structures"
  # RCSB API
  rcsb_api_base: "https://data.rcsb.org/rest/v1/core"
  rcsb_download_base: "https://files.rcsb.org/download"
  # 筛选条件
  resolution_min: 0.0   # 最小分辨率 (Å)
  resolution_max: 4.0   # 最大分辨率 (Å)
  method: "singleParticle"  # 成像方法
  max_entries: 5        # 最大下载条目数（样例模式）

# 生物学组装体配置
bio_assembly:
  enabled: true         # 启用生物组装体展开
  assembly_id: "1"      # 使用的组装体 ID（默认第一个）
  max_chains: 200       # 最大链数安全限制

# 重采样配置
resample:
  target_voxel_sizes: [1.0]  # 目标体素大小 (Å)
  interpolation_order: 3     # 插值阶数 (3=cubic)

# 归一化配置
normalization:
  method: "robust_zscore"  # 方法: robust_zscore, zscore, percentile
  percentile: 95           # percentile 方法的参数
  clip_min: 0.0
  clip_max: 1.0

# 对齐与质量控制配置
alignment_qc:
  # DensityCalculatorE 参数（V3.1: 电子散射因子，更适合 cryo-EM）
  density_calculator: "gemmi_dce"   # 使用 gemmi DensityCalculatorE
  default_resolution: 2.0           # 无 metadata 时使用的默认分辨率 (Å)
  dc_blur: 0                        # DensityCalculatorX blur 参数（0 = 最优）
  # CC 计算参数
  mask_threshold: 0.05    # CC 计算时的 mask 阈值
  # 质量阈值
  cc_threshold: 0.3       # CC_mask 最低通过阈值

# Q-score 配置 (Pintilie et al., 2020)
qscore:
  sigma: 0.6              # 参考高斯宽度 (Å)
  n_directions: 40        # Fibonacci sphere 采样方向数
  max_radius: 2.0         # 最大采样半径 (Å)
  step_size: 0.1          # 径向距离步长 (Å)

# V3 结构域分割配置（Merizo 深度学习工具）
domain_segmentation:
  enabled: true                      # 启用结构域分割
  merizo_path: "tools/merizo"        # Merizo 安装路径
  device: "cpu"                      # 运行设备（cpu/cuda）

# V3 对应标注配置（CA-only 范式 + 三 KDTree）
correspondence:
  # V3 原子类型标签: CA=1, C=2, N=3, O=4, CB=5, other=6
  atom_labels:
    CA: 1
    C: 2
    N: 3
    O: 4
    CB: 5
    OTHER: 6
  # 氨基酸类型标签 (1-20)
  aa_labels:
    ALA: 1
    ARG: 2
    ASN: 3
    ASP: 4
    CYS: 5
    GLN: 6
    GLU: 7
    GLY: 8
    HIS: 9
    ILE: 10
    LEU: 11
    LYS: 12
    MET: 13
    PHE: 14
    PRO: 15
    SER: 16
    THR: 17
    TRP: 18
    TYR: 19
    VAL: 20
  # V3 二级结构标签（重新编号）: helix=1, strand=2, coil=3
  ss_labels:
    helix: 1
    strand: 2
    coil: 3
  # 标注距离阈值 (Å)
  distance_threshold: 3.0
  # V3: Voronoi 默认关闭（CA-only 标签无需 Voronoi 扩展）
  use_voronoi: false
  # V3 界面检测配置
  interface:
    distance_threshold: 5.0         # CA-CA 跨链距离阈值 (Å)

# 增强标注配置
enhancement:
  sim_b_factor: 100.0     # 模拟B因子（控制密度平滑程度）
  sim_resolution: 2.0     # 模拟分辨率 (Å)
  adaptive_blur: true     # 按分辨率缩放 blur: blur = b_factor * (resolution / 2.0)

# 去冗余配置
redundancy:
  sequence_identity: 0.7    # 序列相似度阈值 (70%)
  use_mmseqs2: true         # 启用 MMseqs2 精确聚类（不可用时自动回退 3-mer Jaccard）
  mmseqs2_identity: 0.3     # MMseqs2 聚类序列一致性阈值
  mmseqs2_binary: "tools/mmseqs"  # MMseqs2 二进制路径
  # 数据质量分层（V3.1: 4 层）
  tiers:
    gold:
      max_resolution: 2.5   # Å
      min_cc_mask: 0.80
      min_qscore: 0.60
    silver:
      max_resolution: 4.0
      min_cc_mask: 0.70
      min_qscore: 0.40
    copper:
      min_cc_mask: 0.60
      min_qscore: 0.20
  # V3 Pfam Fold/Family Split（防止结构同源泄露）
  pfam:
    enabled: true                    # 启用 Pfam 分组
    hmmer_binary: "hmmscan"          # HMMER 可执行文件
    pfam_db: "tools/pfam/Pfam-A.hmm" # Pfam-A 数据库路径
    evalue_threshold: 1.0e-5         # E-value 阈值

# 路径配置
paths:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  output_dir: "data/output"
